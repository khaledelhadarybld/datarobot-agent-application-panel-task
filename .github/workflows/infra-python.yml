---
name: Python Infra Checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Ref: https://docs.astral.sh/uv/guides/integration/github/#installation
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          working-directory: infra
          python-version: ${{ matrix.python-version }}

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        working-directory: infra
        run: task install

      - name: Run Static Checks
        working-directory: infra
        run: task lint-check

      - name: Run Unit Tests
        id: run_unit_tests
        working-directory: infra
        run: |
          task unit
          echo "coverage_report_exists=$([ -f coverage.xml ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Get Cover
        if: steps.run_unit_tests.outputs.coverage_report_exists == 'true' && github.event_name == 'pull_request'
        uses: orgoro/coverage@v3.3
        with:
          coverageFile: infra/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
