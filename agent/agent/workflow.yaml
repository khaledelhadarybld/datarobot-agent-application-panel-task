---
general:
  front_end:
    _type: dragent_fastapi
    step_adaptor:
      mode: 'off'
    a2a:
      server:
        name: Smart Order Assistant
        description: >
          A multi-agent food ordering assistant that processes customer orders
          through extraction, validation, pricing, and confirmation steps.
          Uses LLM-based intent classification with conditional LangGraph edges
          for natural conversation handling and order modifications.
      skills:
        - id: place_order
          name: Place Food Order
          description: >
            Extracts food items and quantities from customer messages,
            validates them against the menu, calculates pricing, and
            presents an order summary for confirmation.
          tags: [order, food, menu]
          examples: [I want 2 pizzas and 3 cokes, Can I get a burger and a coke please?]
        - id: modify_order
          name: Modify Order
          description: >
            Allows customers to modify a pending order before confirmation.
            Merges changes with the existing order and re-validates and re-prices.
          tags: [order, modify, change]
          examples:
            - No, add 3 burgers to my order
            - Actually, change to 5 pizzas instead
            - Can you remove the coke and add a burger?
        - id: confirm_order
          name: Confirm Order
          description: >
            Processes explicit order confirmations from the customer
            and finalizes the order.
          tags: [order, confirm, finalize]
          examples: ['Yes, confirm my order', Go ahead, 'Sure, that looks good']
        - id: cancel_order
          name: Cancel Order
          description: >
            Handles order cancellations when the customer decides
            not to proceed with the order.
          tags: [order, cancel]
          examples: [No thanks, Cancel my order, Never mind]
llms:
  datarobot_llm:
    _type: datarobot-llm-component
workflow:
  _type: langgraph_agent
  llm_name: datarobot_llm
  description: >
    Multi-agent food ordering workflow with LLM-based intent classification.
    Specialist agents: Order Extraction, Order Validation, Order Pricing,
    Order Confirmation, and Response Formatting. Orchestrated by an
    LLM-powered intake node with conditional LangGraph edges that correctly
    handles new orders, modifications, confirmations, and cancellations.
authentication:
  datarobot_auth:
    _type: datarobot_api_key
